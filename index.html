<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Offer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
    }
    h1 {
      color: #e60023;
      font-size: 24px;
    }
    p {
      font-size: 16px;
      color: #333;
    }
    .cta-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #28a745;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      margin-top: 15px;
      cursor: pointer;
    }
    .cta-btn:hover {
      background: #218838;
    }
    .countdown {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎁 Limited Time Offer!</h1>
  <p>Get your exclusive deal now before it expires.</p>

  <img src="https://via.placeholder.com/400x250" width="100%" />

  <div class="countdown" id="timer">Offer ends in: 05:00</div>

  <input type="text" placeholder="Enter your name">
  <input type="tel" placeholder="Enter your phone number">

  <button class="cta-btn">Claim Now</button>
</div>

<script>
  let time = 300;
  let timer = document.getElementById("timer");

  setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timer.innerHTML = `Offer ends in: ${min}:${sec < 10 ? '0'+sec : sec}`;
    if(time > 0) time--;
  }, 1000);
</script>

</body>
</html>
